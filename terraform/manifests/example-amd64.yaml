apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-amd64
  labels:
    app: hello-amd64
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-amd64
  template:
    metadata:
      labels:
        app: hello-amd64
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: hello
          image: public.ecr.aws/docker/library/nginx:1.27
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
